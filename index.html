<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Journal</title>

<style>
:root {
    --bg: #0f1117;
    --card: #181b23;
    --text: #eaeaf0;
    --muted: #a0a4b8;
    --accent: #7c9cff;
    --success: #4ade80;
    --border: #2a2e3b;
    --danger: #ef4444;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    padding: 20px;
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
}

.box {
    width: 100%;
    max-width: 720px;
    background: var(--card);
    padding: 20px;
    border-radius: 12px;
}

textarea, input {
    width: 100%;
    background: #10131a;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-size: 16px;
}

textarea {
    min-height: 140px;
    resize: vertical;
}

button {
    background: var(--accent);
    border: none;
    color: white;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
}

button:hover { opacity: 0.9; }

pre {
    background: #0b0e14;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
}

hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 25px 0;
}

.message { color: var(--success); }

/* ===== MIC ===== */
.mic-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    font-size: 20px;
}

.mic-btn.listening {
    background: var(--danger);
    box-shadow: 0 0 14px rgba(239,68,68,0.8);
}

/* ===== CALENDAR ===== */
.calendar {
    background: #10131a;
    border-radius: 12px;
    padding: 15px;
    margin-top: 10px;
}

.cal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
}

.day-name {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
}

.day {
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.day:hover {
    background: var(--border);
}

.day.selected {
    background: var(--accent);
    color: white;
}
</style>
</head>

<body>
<div class="box">

<h2>📅 Today: {{ todayDate }}</h2>

<!-- JOURNAL INPUT -->
<form method="POST">
    <div style="position:relative;">
        <textarea id="entry" name="entry" placeholder="Write or speak..."></textarea>
        <button type="button" id="micBtn" class="mic-btn">🎤</button>
    </div>
    <button name="action" value="save" style="margin-top:10px;">Save</button>
</form>

{% if message %}
<p class="message">{{ message }}</p>
{% endif %}

<h3>📖 Today's Notes</h3>
<pre>{{ todayData }}</pre>

<hr>

<!-- CALENDAR -->
<h3>🔍 Select Date</h3>
<form method="POST">
    <input type="hidden" name="date" id="selectedDate">

    <div class="calendar">
        <div class="cal-header">
            <button type="button" onclick="changeMonth(-1)">◀</button>
            <strong id="monthYear"></strong>
            <button type="button" onclick="changeMonth(1)">▶</button>
        </div>

        <div class="cal-grid" id="calendar"></div>
    </div>

    <button name="action" value="get" style="margin-top:10px;">Get Notes</button>
</form>

</div>

<script>
/* ===== SPEECH RECOGNITION ===== */
const textarea = document.getElementById("entry");
const micBtn = document.getElementById("micBtn");

let recognition;
let listening = false;

if ("webkitSpeechRecognition" in window) {
    recognition = new webkitSpeechRecognition();
    recognition.lang = "en-IN";
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onstart = () => {
        listening = true;
        micBtn.classList.add("listening");
    };

    recognition.onend = () => {
        listening = false;
        micBtn.classList.remove("listening");
    };

    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        textarea.value += (textarea.value ? "\n" : "") + text;
    };
} else {
    micBtn.disabled = true;
    micBtn.textContent = "❌";
}

micBtn.onclick = () => {
    if (!recognition || listening) return;
    recognition.start();
};

/* ===== CALENDAR ===== */
const calendar = document.getElementById("calendar");
const monthYear = document.getElementById("monthYear");
const selectedDateInput = document.getElementById("selectedDate");

let currentDate = new Date();
let selectedCell = null;
const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function renderCalendar() {
    calendar.innerHTML = "";
    monthYear.textContent = currentDate.toLocaleString("default", {
        month: "long",
        year: "numeric"
    });

    days.forEach(d => {
        const el = document.createElement("div");
        el.textContent = d;
        el.className = "day-name";
        calendar.appendChild(el);
    });

    const firstDay = new Date(
        currentDate.getFullYear(),
        currentDate.getMonth(),
        1
    ).getDay();

    const lastDate = new Date(
        currentDate.getFullYear(),
        currentDate.getMonth() + 1,
        0
    ).getDate();

    for (let i = 0; i < firstDay; i++) {
        calendar.appendChild(document.createElement("div"));
    }

    for (let d = 1; d <= lastDate; d++) {
        const cell = document.createElement("div");
        cell.textContent = d;
        cell.className = "day";

        cell.onclick = () => {
            if (selectedCell) selectedCell.classList.remove("selected");
            cell.classList.add("selected");
            selectedCell = cell;

            const dd = String(d).padStart(2, "0");
            const mm = String(currentDate.getMonth() + 1).padStart(2, "0");
            const yyyy = currentDate.getFullYear();
            selectedDateInput.value = `${dd}-${mm}-${yyyy}`;
        };

        calendar.appendChild(cell);
    }
}

function changeMonth(step) {
    currentDate.setMonth(currentDate.getMonth() + step);
    renderCalendar();
}

renderCalendar();
</script>

</body>
</html>
